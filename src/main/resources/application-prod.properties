# ============================================================
# CONFIGURATION PRODUCTION - Dija Saliou
# ============================================================
# Ce fichier est utilisé en production avec le profil "prod"
# Toutes les valeurs sensibles sont chargées depuis les variables d'environnement
# AUCUN SECRET NE DOIT ÊTRE DANS CE FICHIER

spring.application.name=dijaSaliou

# ============================================================
# BASE DE DONNÉES - Production
# ============================================================
# IMPORTANT: Utiliser la base de données de production (Heroku, AWS RDS, etc.)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# ============================================================
# JWT - CRITIQUE: Secret fort et unique
# ============================================================
# IMPORTANT: Générer un secret de 256 bits minimum
# Commande: openssl rand -base64 64
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ============================================================
# COOKIES - Sécurisés en HTTPS
# ============================================================
app.cookie.secure=true
app.cookie.same-site=None

# Setup Super Admin
setup.secret.key=${SETUP_SECRET_KEY:disabled}

# ============================================================
# EMAIL - Configuration SMTP
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

app.email.from=${APP_EMAIL_FROM:noreply@dijasaliou.com}
app.email.support=${APP_EMAIL_SUPPORT}

# ============================================================
# URL FRONTEND
# ============================================================
app.frontend.url=${APP_FRONTEND_URL}

# ============================================================
# LOGS - Production (INFO/WARN uniquement)
# ============================================================
logging.level.root=INFO
logging.level.org.springframework.web=WARN
logging.level.com.example.dijasaliou=INFO

# ============================================================
# JPA/HIBERNATE - Production
# ============================================================
spring.jpa.hibernate.ddl-auto=update

# Flyway — crée les tables au premier démarrage
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# CRITIQUE: Désactiver show-sql en production (sécurité + performance)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.validator.apply_to_ddl=false

# ============================================================
# SERVEUR
# ============================================================
server.port=${PORT:8080}
server.servlet.context-path=/api

# ============================================================
# JACKSON - Dates
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=Europe/Paris

# ============================================================
# CONNEXIONS BASE DE DONNÉES - Production
# ============================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000


# ============================================================
# WAVE - Mobile Money Sénégal (PRODUCTION)
# ============================================================
wave.api.key=${WAVE_API_KEY:disabled}
wave.api.secret=${WAVE_API_SECRET:disabled}
wave.api.url=${WAVE_API_URL:https://api.wave.com/v1}
wave.webhook.url=${WAVE_WEBHOOK_URL:disabled}

# ============================================================
# UPLOADS - Limite de taille des fichiers
# ============================================================
# Taille max par fichier: 5MB
spring.servlet.multipart.max-file-size=5MB
# Taille max totale par requête: 10MB
spring.servlet.multipart.max-request-size=10MB
