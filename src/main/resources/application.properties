spring.application.name=dijaSaliou
# Profil local actif par défaut — Railway l'écrase avec SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=local
spring.datasource.url=jdbc:mysql://localhost:3306/dijaSaliou
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}

# JWT - DÉVELOPPEMENT uniquement
# IMPORTANT: En production, utiliser application-prod.properties avec JWT_SECRET depuis env
jwt.secret=${JWT_SECRET}
jwt.expiration=604800000

# Configuration des cookies (dev vs prod)
app.cookie.secure=false

# Configuration de l'email
# IMPORTANT: Configurer un serveur SMTP réel pour envoyer des emails
# Options populaires: Gmail, SendGrid, Mailgun, AWS SES, etc.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Adresse email d'envoi
app.email.from=contact@heasystock.com

# Adresse email de support (pour recevoir les messages de contact)


# URL du frontend (pour les liens de réinitialisation)
app.frontend.url=http://localhost:4200

# Mode debug pour développement seulement
# IMPORTANT: En production, ces valeurs seront INFO/WARN
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.com.example.dijasaliou=DEBUG

# DÉVELOPPEMENT: update pour créer/modifier tables automatiquement
# PRODUCTION: validate (défini dans application-prod.properties)
spring.jpa.hibernate.ddl-auto=update
# DÉVELOPPEMENT: show-sql pour debug
# PRODUCTION: false (défini dans application-prod.properties)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

server.port=8080
server.servlet.context-path=/api

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=UTC

# Activer LiveReload (rafraichit le navigateur automatiquement)
spring.devtools.livereload.enabled=true

# Activer la validation automatique des beans
spring.jpa.properties.hibernate.validator.apply_to_ddl=false

# Nombre maximum de connexions a la base (20 pour absorber les pics SaaS multi-tenant)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# Temps d'attente maximum pour obtenir une connexion (ms)
spring.datasource.hikari.connection-timeout=30000

# Duree de vie maximale d'une connexion (ms)
spring.datasource.hikari.max-lifetime=1800000


# Configuration Cloudinary (stockage cloud des images)
# Valeurs définies dans application-local.properties (dev) ou variables d'environnement (prod)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Configuration Wave (Mobile Money Sénégal)
# IMPORTANT: Les clés Wave sont chargées depuis les variables d'environnement
# Pour obtenir vos clés: https://developers.wave.com/
# Clé API Wave
wave.api.key=${WAVE_API_KEY:}
# Secret API Wave
wave.api.secret=${WAVE_API_SECRET:}
# URL de l'API Wave (production ou sandbox)
wave.api.url=${WAVE_API_URL:https://api.wave.com/v1}
# URL du webhook Wave (pour recevoir les notifications de paiement)
wave.webhook.url=${WAVE_WEBHOOK_URL:http://localhost:8080/api/payment/wave/webhook}

# ============================================================
# UPLOADS - Limite de taille des fichiers (Sécurité)
# ============================================================
# Taille max par fichier: 5MB
spring.servlet.multipart.max-file-size=5MB
# Taille max totale par requête: 10MB
spring.servlet.multipart.max-request-size=10MB

