# ===== Configuration pour les tests d'intégration @SpringBootTest =====

# Base de données H2 en mémoire (remplace MySQL)
spring.datasource.url=jdbc:h2:mem:dijasaliou-it;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Désactiver le context path pour simplifier les URLs dans MockMvc
server.servlet.context-path=/

# Email — désactivé pour les tests
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test
spring.mail.password=test

# JWT — utilise la valeur par défaut du application.properties
# jwt.secret=${JWT_SECRET:MonSuperSecret...} est déjà défini
