name: Backup MySQL → Google Drive

# Backup automatique de la BDD MySQL Railway vers Google Drive.
#
# Déclenchement :
#   - Automatique : tous les jours à 03:00 UTC (04:00 ou 05:00 heure Sénégal selon DST)
#   - Manuel : onglet "Actions" du repo → "Backup MySQL → Google Drive" → "Run workflow"
#
# Secrets requis (Settings → Secrets and variables → Actions) :
#   MYSQL_PUBLIC_URL       → URL complète depuis Railway → MySQL → Variables
#                            (format mysql://USER:PASS@HOST:PORT/DATABASE — la PUBLIQUE,
#                            pas l'INTERNE qui n'est pas accessible depuis GitHub)
#   GDRIVE_FOLDER_ID       → ID du dossier Drive (sur le compte easystock@gmail.com)
#   GDRIVE_CLIENT_ID       → OAuth Client ID (depuis Google Cloud Console)
#   GDRIVE_CLIENT_SECRET   → OAuth Client Secret
#   GDRIVE_REFRESH_TOKEN   → Refresh token obtenu via oauth-setup/get_refresh_token.py
#
# L'upload se fait au nom du compte propriétaire (easystock@gmail.com) — utilise
# son quota Drive (100 Go Google One), pas celui d'un Service Account.
#
# Rétention : 30 backups les plus récents (les plus anciens sont supprimés du Drive).

on:
  schedule:
    - cron: '0 3 * * *'   # tous les jours à 3h UTC
  workflow_dispatch:       # bouton manuel "Run workflow"

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer le client MySQL
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y mysql-client gzip

      - name: Dumper la BDD
        env:
          MYSQL_PUBLIC_URL: ${{ secrets.MYSQL_PUBLIC_URL }}
        run: |
          # pipefail : si mysqldump plante, gzip ne masque plus l'erreur
          set -eo pipefail

          # Parse mysql://USER:PASS@HOST:PORT/DATABASE en 5 variables
          # Plus robuste qu'avoir 5 secrets séparés à copier-coller à la main.
          if [ -z "$MYSQL_PUBLIC_URL" ]; then
            echo "::error::Le secret MYSQL_PUBLIC_URL est vide. Copier la valeur de Railway → MySQL → Variables → MYSQL_PUBLIC_URL."
            exit 1
          fi

          # Format attendu : mysql://user:password@host:port/database
          NO_PROTOCOL="${MYSQL_PUBLIC_URL#mysql://}"
          USER_PASS="${NO_PROTOCOL%@*}"
          HOST_PORT_DB="${NO_PROTOCOL#*@}"
          DB_USER="${USER_PASS%%:*}"
          DB_PASS="${USER_PASS#*:}"
          HOST_PORT="${HOST_PORT_DB%/*}"
          DB_NAME="${HOST_PORT_DB#*/}"
          DB_HOST="${HOST_PORT%:*}"
          DB_PORT="${HOST_PORT#*:}"

          echo "Connexion à ${DB_HOST}:${DB_PORT} / base ${DB_NAME} (user=${DB_USER})"

          TIMESTAMP=$(date -u +'%Y-%m-%d_%Hh%Mm')
          FILENAME="easystock-backup-${TIMESTAMP}.sql.gz"
          echo "BACKUP_FILE=${FILENAME}" >> $GITHUB_ENV

          MYSQL_PWD="$DB_PASS" mysqldump \
            --host="$DB_HOST" \
            --port="$DB_PORT" \
            --user="$DB_USER" \
            --single-transaction \
            --quick \
            --routines \
            --triggers \
            --no-tablespaces \
            --set-gtid-purged=OFF \
            "$DB_NAME" \
            | gzip -9 > "${FILENAME}"

          SIZE_BYTES=$(stat -c%s "${FILENAME}")
          SIZE=$(ls -lh "${FILENAME}" | awk '{print $5}')

          # Sanity check : un dump valide fait toujours >1 KB (rien que les CREATE TABLE)
          if [ "${SIZE_BYTES}" -lt 1024 ]; then
            echo "::error::❌ Dump anormalement petit (${SIZE_BYTES} octets) — mysqldump a échoué."
            exit 1
          fi

          echo "✅ Dump créé : ${FILENAME} (${SIZE})"

      - name: Installer Python + libs Google Drive
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install --quiet google-api-python-client google-auth

      - name: Uploader sur Google Drive + rotation (OAuth)
        env:
          GDRIVE_FOLDER_ID:      ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_CLIENT_ID:      ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET:  ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN:  ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          BACKUP_FILE:           ${{ env.BACKUP_FILE }}
        run: |
          python <<'PYTHON'
          import os
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          MAX_BACKUPS = 30  # rotation : garde les 30 plus récents

          folder_id = os.environ['GDRIVE_FOLDER_ID']
          filename  = os.environ['BACKUP_FILE']

          # Credentials OAuth utilisateur (utilise le quota Drive du compte easystock@gmail.com)
          creds = Credentials(
              token=None,
              refresh_token=os.environ['GDRIVE_REFRESH_TOKEN'],
              token_uri='https://oauth2.googleapis.com/token',
              client_id=os.environ['GDRIVE_CLIENT_ID'],
              client_secret=os.environ['GDRIVE_CLIENT_SECRET'],
              scopes=['https://www.googleapis.com/auth/drive']
          )
          drive = build('drive', 'v3', credentials=creds, cache_discovery=False)

          # 1) Upload
          file_metadata = {'name': filename, 'parents': [folder_id]}
          media = MediaFileUpload(filename, mimetype='application/gzip', resumable=True)
          uploaded = drive.files().create(
              body=file_metadata,
              media_body=media,
              fields='id, name, size'
          ).execute()
          size_mb = int(uploaded.get('size', 0)) / (1024 * 1024)
          print(f"✅ Upload OK : {uploaded['name']} ({size_mb:.2f} MB) — id {uploaded['id']}")

          # 2) Rotation : lister tous les backups du dossier, garder les MAX_BACKUPS plus récents
          query = (
              f"'{folder_id}' in parents and trashed = false "
              f"and name contains 'easystock-backup-'"
          )
          results = drive.files().list(
              q=query,
              fields='files(id, name, createdTime)',
              orderBy='createdTime desc',
              pageSize=200
          ).execute()
          backups = results.get('files', [])
          print(f"📦 {len(backups)} backup(s) dans le dossier Drive")

          if len(backups) > MAX_BACKUPS:
              to_delete = backups[MAX_BACKUPS:]
              for b in to_delete:
                  drive.files().delete(fileId=b['id']).execute()
                  print(f"🗑️  Supprimé : {b['name']}")
              print(f"✅ Rotation : {len(to_delete)} ancien(s) backup(s) supprimé(s)")
          else:
              print(f"ℹ️  Rotation non nécessaire (< {MAX_BACKUPS} backups)")
          PYTHON

      - name: Nettoyer les fichiers temporaires
        if: always()
        run: |
          rm -f easystock-backup-*.sql.gz

      - name: Résumé
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "::notice::✅ Backup MySQL réussi : ${{ env.BACKUP_FILE }}"
          else
            echo "::error::❌ Backup MySQL ÉCHOUÉ. Vérifier les logs ci-dessus."
          fi
