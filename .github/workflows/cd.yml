name: CD — Build & Package

on:
  push:
    branches: [ master, main ]

jobs:
  build:
    name: Build JAR & Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR (skip tests — already run by CI)
        run: ./mvnw package -B -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/heasystock:latest
            ${{ secrets.DOCKER_USERNAME }}/heasystock:${{ github.sha }}

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: heasystock-jar
          path: target/*.jar
          retention-days: 14
